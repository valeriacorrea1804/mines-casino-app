<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1d29; color: white; font-family: sans-serif; text-align: center; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            max-width: 350px; 
            margin: 20px auto; 
        }
        .cell { 
            aspect-ratio: 1; 
            background-color: #2c313f; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            cursor: pointer;
        }
        .cell.gem { background-color: #00d395; } /* Color gema */
        .cell.mine { background-color: #ff4b4b; } /* Color bomba */
    </style>
</head>
<body>
    <h1>MINES</h1>
    <div class="grid" id="grid"></div>

    <script>
        const grid = document.getElementById('grid');
        // Crear 25 casillas
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => {
                // Lógica visual: al hacer clic, mostrar gema o bomba
                cell.innerHTML = Math.random() > 0.2 ? '💎' : '💣';
                cell.classList.add(cell.innerHTML === '💎' ? 'gem' : 'mine');
            };
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
